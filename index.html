<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>karasuletters — editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #111110;
  --black2: #1a1a18;
  --cream: #f0ede6;
  --gold: #c8b89a;
  --mid: #888880;
  --border: #2a2a28;
  --surface: #1e1e1c;
}

html, body {
  height: 100%;
  background: var(--black);
  color: var(--cream);
  font-family: 'EB Garamond', Georgia, serif;
}

/* grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.35;
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  max-width: 680px;
  margin: 0 auto;
  padding: 0 0 80px;
}

/* ===== HEADER ===== */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
}
.top-logo {
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--gold);
  text-transform: uppercase;
}
.top-mode {
  display: flex;
  gap: 4px;
}
.mode-btn {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--mid);
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn.active {
  background: var(--cream);
  color: var(--black);
  border-color: var(--cream);
}

/* ===== FIELDS ===== */
.fields {
  padding: 28px 28px 0;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.field-label {
  font-size: 10px;
  letter-spacing: 0.25em;
  color: var(--gold);
  text-transform: uppercase;
  display: block;
  margin-bottom: 8px;
}
input[type="text"], textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--cream);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 16px;
  padding: 12px 16px;
  outline: none;
  transition: border-color 0.2s;
  resize: none;
  -webkit-appearance: none;
}
input[type="text"]:focus, textarea:focus {
  border-color: var(--gold);
}
input[type="text"]::placeholder, textarea::placeholder {
  color: #444440;
}

/* ===== CLAUDE PANEL ===== */
.claude-panel {
  padding: 28px 28px 0;
}
.claude-prompt-wrap {
  display: flex;
  gap: 8px;
}
.claude-prompt-wrap textarea {
  flex: 1;
  height: 80px;
}
.claude-btn {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 0 18px;
  background: var(--surface);
  border: 1px solid var(--gold);
  color: var(--gold);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  align-self: stretch;
}
.claude-btn:hover { background: var(--gold); color: var(--black); }
.claude-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.claude-status {
  font-size: 11px;
  color: var(--mid);
  letter-spacing: 0.1em;
  margin-top: 10px;
  min-height: 18px;
  font-style: italic;
}

/* ===== DIVIDER ===== */
.divider {
  margin: 28px 28px 0;
  border: none;
  border-top: 1px solid var(--border);
}

/* ===== BODY EDITOR ===== */
.body-wrap {
  padding: 24px 28px 0;
}
#body-editor {
  width: 100%;
  min-height: 320px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--cream);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 17px;
  line-height: 1.9;
  padding: 20px;
  outline: none;
  transition: border-color 0.2s;
  resize: vertical;
}
#body-editor:focus { border-color: var(--gold); }
#body-editor::placeholder { color: #444440; }

/* ===== PREVIEW ===== */
#preview-wrap {
  padding: 24px 28px 0;
  display: none;
}
.preview-frame {
  border: 1px solid var(--border);
  background: #f0ede6;
  width: 100%;
  min-height: 400px;
  overflow: hidden;
}
#preview-inner {
  width: 100%;
  padding: 0;
}

/* ===== SEND BAR ===== */
.send-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 10;
  background: var(--black2);
  border-top: 1px solid var(--border);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  gap: 12px;
  max-width: 680px;
  margin: 0 auto;
}
.send-btn {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 12px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 14px 28px;
  background: var(--cream);
  color: var(--black);
  border: none;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--gold); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-status {
  font-size: 13px;
  color: var(--mid);
  font-style: italic;
  flex: 1;
}
.send-status.ok { color: #7ab87a; }
.send-status.err { color: #c87a7a; }

/* ===== DRAFT MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--black2);
  border: 1px solid var(--border);
  width: 90%;
  max-width: 420px;
  max-height: 70vh;
  overflow-y: auto;
  padding: 28px;
}
.modal-title {
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 20px;
}
.draft-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: color 0.2s;
}
.draft-item:hover { color: var(--gold); }
.draft-item-name { font-size: 15px; margin-bottom: 4px; }
.draft-item-date { font-size: 11px; color: var(--mid); letter-spacing: 0.05em; }
.modal-close {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 10px 20px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--mid);
  cursor: pointer;
  margin-top: 20px;
  width: 100%;
}
.draft-empty { font-size: 14px; color: var(--mid); font-style: italic; }

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  /* layout */
  .app { padding-bottom: 120px; }
  .top-bar {
    padding: 14px 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .top-logo { font-size: 10px; letter-spacing: 0.2em; }
  .top-mode { gap: 3px; flex-wrap: wrap; }
  .mode-btn {
    font-size: 9px;
    padding: 5px 10px;
    letter-spacing: 0.12em;
  }

  /* fields */
  .fields { padding: 20px 16px 0; gap: 16px; }
  .claude-panel { padding: 20px 16px 0; }
  .body-wrap { padding: 18px 16px 0; }
  .divider { margin: 20px 16px 0; }
  #preview-wrap { padding: 18px 16px 0; }

  /* inputs */
  input[type="text"],
  input[type="datetime-local"],
  textarea { font-size: 15px; padding: 10px 14px; }
  #body-editor { font-size: 16px; min-height: 240px; }
  .claude-prompt-wrap { flex-direction: column; }
  .claude-prompt-wrap textarea { height: 72px; }
  .claude-btn {
    width: 100%;
    padding: 12px;
    align-self: auto;
  }

  /* send bar — compact 2-row layout */
  .send-bar {
    padding: 10px 16px;
    flex-wrap: wrap;
    gap: 8px;
    left: 0;
    right: 0;
    max-width: 100%;
  }
  .send-btn {
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 10px 14px;
    flex: 1;
    text-align: center;
  }
  .send-status {
    font-size: 11px;
    width: 100%;
    flex: none;
    text-align: center;
    padding: 2px 0 4px;
  }

  /* modal */
  .modal { padding: 20px 18px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <span class="top-logo">karasuletters — editor</span>
    <div class="top-mode">
      <button class="mode-btn active" id="btn-edit" onclick="setMode('edit')">編集</button>
      <button class="mode-btn" id="btn-preview" onclick="setMode('preview')">プレビュー</button>
      <button class="mode-btn" onclick="saveDraftToDrive()" title="Google Driveに下書き保存">保存</button>
      <button class="mode-btn" onclick="showDraftList()" title="下書き一覧">下書き</button>
    </div>
  </div>

  <!-- META FIELDS -->
  <div class="fields">
    <div>
      <label class="field-label">号数 / Issue</label>
      <input type="text" id="issue" placeholder="No.001" value="No.001">
    </div>
    <div>
      <label class="field-label">件名 / Subject</label>
      <input type="text" id="subject" placeholder="【karasuletters】近況とお知らせ">
    </div>
    <div>
      <label class="field-label">日付 / Date</label>
      <input type="text" id="date" placeholder="2026年6月">
    </div>
    <div>
      <label class="field-label">配信予定日時 / Schedule</label>
      <input type="datetime-local" id="schedule-dt" style="color-scheme:dark;">
    </div>
    <div>
      <label class="field-label">署名 / Sign-off</label>
      <input type="text" id="signoff" placeholder="Shikine Watanabe" value="Shikine Watanabe">
    </div>
  </div>

  <hr class="divider">

  <!-- CLAUDE ASSIST -->
  <div class="claude-panel">
    <label class="field-label">Claude に原稿を書いてもらう</label>
    <div class="claude-prompt-wrap">
      <textarea id="claude-prompt" placeholder="例：今月は豊岡演劇祭に参加しました。舞台美術について書いてください。"></textarea>
      <button class="claude-btn" id="claude-gen-btn" onclick="generateWithClaude()">生成</button>
    </div>
    <p class="claude-status" id="claude-status"></p>
  </div>

  <hr class="divider">

  <!-- BODY EDITOR -->
  <div class="body-wrap" id="edit-wrap">
    <label class="field-label">本文</label>
    <textarea id="body-editor" placeholder="ここに本文を書いてください。&#10;&#10;Claudeで生成した文章をそのまま使うか、自分で書き換えて仕上げてください。"></textarea>
  </div>

  <!-- PREVIEW -->
  <div id="preview-wrap">
    <label class="field-label">プレビュー</label>
    <div class="preview-frame">
      <div id="preview-inner"></div>
    </div>
  </div>

</div>

<!-- DRAFT MODAL -->
<div class="modal-overlay" id="draft-modal">
  <div class="modal">
    <p class="modal-title">下書き一覧</p>
    <div id="draft-list"></div>
    <button class="modal-close" onclick="closeDraftModal()">閉じる</button>
  </div>
</div>

<!-- SEND BAR -->
<div class="send-bar">
  <button class="send-btn" id="send-btn" onclick="sendMail()">今すぐ配信</button>
  <button class="send-btn" id="schedule-btn" onclick="scheduleMail()" style="background:transparent;border:1px solid var(--gold);color:var(--gold);">予約配信</button>
  <button class="send-btn" id="cancel-btn" onclick="cancelSchedule()" style="background:transparent;border:1px solid #c87a7a;color:#c87a7a;">予約取消</button>
  <span class="send-status" id="send-status">配信日時を設定して予約するか、今すぐ配信できます</span>
</div>

<script>
// ===== CONFIG =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyieDzOkdfRhkqzWx51YnUC6Y-537NnTCfpDkCaXGNOLMYJTDzG36kBhgcllVQu1VV5tQ/exec';

// ===== MODE =====
function setMode(mode) {
  const editWrap    = document.getElementById('edit-wrap');
  const previewWrap = document.getElementById('preview-wrap');
  document.getElementById('btn-edit').classList.toggle('active', mode === 'edit');
  document.getElementById('btn-preview').classList.toggle('active', mode === 'preview');
  if (mode === 'preview') {
    editWrap.style.display    = 'none';
    previewWrap.style.display = 'block';
    document.getElementById('preview-inner').innerHTML = buildHTML();
  } else {
    editWrap.style.display    = 'block';
    previewWrap.style.display = 'none';
  }
}

// ===== BUILD HTML EMAIL =====
function buildHTML() {
  const issue   = document.getElementById('issue').value   || 'No.001';
  const date    = document.getElementById('date').value    || '';
  const signoff = document.getElementById('signoff').value || '';
  const body    = document.getElementById('body-editor').value || '';

  const bodyHTML = body.split(/\n\n+/).map(p =>
    p.trim() ? `<p style="font-size:16px;line-height:1.9;color:#2a2a2a;margin:0 0 24px;font-family:Georgia,serif;">${p.replace(/\n/g,'<br>')}</p>` : ''
  ).join('');

  return `
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f0ede6;padding:40px 0;">
<tr><td align="center">
<table width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;background-color:#faf9f5;">
  <tr><td style="background-color:#1a1a1a;padding:40px 48px 32px;border-bottom:3px solid #c8b89a;">
    <p style="font-size:11px;letter-spacing:0.35em;color:#c8b89a;text-transform:uppercase;margin:0 0 12px;font-family:Georgia,serif;">letters from karasu</p>
    <h1 style="font-size:28px;color:#faf9f5;margin:0;font-weight:normal;font-family:Georgia,serif;letter-spacing:0.05em;">karasuletters</h1>
    <p style="font-size:11px;letter-spacing:0.2em;color:#888;text-transform:uppercase;margin:16px 0 0;font-family:Georgia,serif;">${issue}</p>
  </td></tr>
  <tr><td style="background-color:#e8e2d8;padding:10px 48px;border-bottom:1px solid #d4ccc0;">
    <p style="margin:0;font-size:11px;letter-spacing:0.15em;color:#888;font-family:Georgia,serif;text-transform:uppercase;">${date}</p>
  </td></tr>
  <tr><td style="padding:48px 48px 0;">
    ${bodyHTML}
  </td></tr>
  <tr><td style="padding:0 48px 48px;">
    <p style="font-size:14px;color:#555;font-family:Georgia,serif;font-style:italic;margin:0;">with love,</p>
    <p style="font-size:16px;color:#1a1a1a;font-family:Georgia,serif;margin:8px 0 0;letter-spacing:0.05em;">${signoff}</p>
  </td></tr>
  <tr><td style="background-color:#1a1a1a;padding:32px 48px;">
    <p style="font-size:10px;letter-spacing:0.3em;color:#c8b89a;text-transform:uppercase;font-family:Georgia,serif;margin:0 0 16px;">karasuletters</p>
    <p style="font-size:11px;color:#666;line-height:1.7;font-family:Georgia,serif;margin:0 0 8px;">このメールは購読を申し込まれた方にお送りしています。</p>
    <p style="font-size:11px;color:#666;line-height:1.7;font-family:Georgia,serif;margin:8px 0 0;">
      配信停止をご希望の方は <a href="mailto:weavingsound1024@gmail.com" style="color:#888;text-decoration:underline;">weavingsound1024@gmail.com</a> に空メールをお送りください。自動的にリストから削除されます。
    </p>
  </td></tr>
</table>
</td></tr>
</table>`;
}

// ===== CLAUDE GENERATE =====
async function generateWithClaude() {
  const prompt = document.getElementById('claude-prompt').value.trim();
  if (!prompt) return;
  const btn    = document.getElementById('claude-gen-btn');
  const status = document.getElementById('claude-status');
  btn.disabled = true;
  status.textContent = '生成中...';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'あなたはメールマガジン「karasuletters」の編集アシスタントです。舞台美術家・建築家・美術作家として活動する渡辺志鬼根さんのメルマガの本文を書きます。文体は一人称・エッセイ調・ていねい語。改行は段落ごとに空行を入れてください。HTMLタグは使わないこと。',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    document.getElementById('body-editor').value = text;
    status.textContent = '✓ 生成しました。本文を確認・編集してください。';
  } catch(e) {
    status.textContent = 'エラーが発生しました。もう一度お試しください。';
  }
  btn.disabled = false;
}

// ===== SEND VIA GAS =====
async function sendMail() {
  const subject = document.getElementById('subject').value.trim();
  const body    = document.getElementById('body-editor').value.trim();
  if (!subject) { setStatus('件名を入力してください', 'err'); return; }
  if (!body)    { setStatus('本文を入力してください', 'err'); return; }

  const confirmed = confirm(`件名：${subject}\n\nGoogle Sheets の全読者にメールを送信します。よろしいですか？`);
  if (!confirmed) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  setStatus('送信中... しばらくお待ちください', '');

  const htmlContent = buildHTML();

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        subject: subject,
        html: htmlContent
      })
    });

    const data = await res.json();
    if (data.ok) {
      setStatus(`✓ ${data.sent} 件のメールを送信しました！`, 'ok');
    } else {
      setStatus(`エラー: ${data.error || '送信に失敗しました'}`, 'err');
    }
  } catch(e) {
    setStatus('通信エラーが発生しました。GASのURLを確認してください。', 'err');
  }
  btn.disabled = false;
}

// ===== CANCEL SCHEDULE =====
async function cancelSchedule() {
  const confirmed = confirm('予約配信をキャンセルします。Googleカレンダーの予定も削除されます。よろしいですか？');
  if (!confirmed) return;

  const btn = document.getElementById('cancel-btn');
  btn.disabled = true;
  setStatus('キャンセル中...', '');

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'cancelSchedule' })
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('schedule-dt').value = '';
      setStatus('✓ 予約をキャンセルしました。カレンダーの予定も削除されました。', 'ok');
    } else {
      setStatus('エラー: キャンセルに失敗しました', 'err');
    }
  } catch(e) {
    setStatus('通信エラーが発生しました', 'err');
  }
  btn.disabled = false;
}

// ===== DRAFT: SAVE =====
async function saveDraftToDrive() {
  const data = {
    issue:    document.getElementById('issue').value,
    subject:  document.getElementById('subject').value,
    date:     document.getElementById('date').value,
    signoff:  document.getElementById('signoff').value,
    body:     document.getElementById('body-editor').value,
    schedule: document.getElementById('schedule-dt').value,
  };

  const btn = document.querySelector('.mode-btn[onclick="saveDraftToDrive()"]');
  btn.textContent = '保存中...';

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveDraft', data })
    });
    const result = await res.json();
    if (result.ok) {
      btn.textContent = '✓ 保存';
      setTimeout(() => btn.textContent = '保存', 2000);
    } else {
      btn.textContent = '保存';
      alert('保存に失敗しました');
    }
  } catch(e) {
    btn.textContent = '保存';
    alert('通信エラーが発生しました');
  }
}

// ===== DRAFT: LIST =====
async function showDraftList() {
  document.getElementById('draft-modal').classList.add('open');
  const listEl = document.getElementById('draft-list');
  listEl.innerHTML = '<p class="draft-empty">読み込み中...</p>';

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'listDrafts' })
    });
    const result = await res.json();
    if (result.ok && result.drafts.length > 0) {
      listEl.innerHTML = result.drafts.map(d => {
        const issue = d.name.replace('draft_', '').replace('.json', '');
        const date  = new Date(d.updated).toLocaleString('ja-JP');
        return `<div class="draft-item" onclick="loadDraftFromDrive('${issue}')">
          <div class="draft-item-name">${issue}</div>
          <div class="draft-item-date">${date}</div>
        </div>`;
      }).join('');
    } else {
      listEl.innerHTML = '<p class="draft-empty">下書きはまだありません</p>';
    }
  } catch(e) {
    listEl.innerHTML = '<p class="draft-empty">読み込みに失敗しました</p>';
  }
}

// ===== DRAFT: LOAD =====
async function loadDraftFromDrive(issue) {
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'loadDraft', issue })
    });
    const result = await res.json();
    if (result.ok) {
      const d = result.data;
      document.getElementById('issue').value       = d.issue    || '';
      document.getElementById('subject').value     = d.subject  || '';
      document.getElementById('date').value        = d.date     || '';
      document.getElementById('signoff').value     = d.signoff  || '';
      document.getElementById('body-editor').value = d.body     || '';
      document.getElementById('schedule-dt').value = d.schedule || '';
      closeDraftModal();
      setStatus('✓ 下書きを読み込みました', 'ok');
    }
  } catch(e) {
    alert('読み込みに失敗しました');
  }
}

function closeDraftModal() {
  document.getElementById('draft-modal').classList.remove('open');
}

function setStatus(msg, cls) {
  const el = document.getElementById('send-status');
  el.textContent = msg;
  el.className = 'send-status ' + cls;
}

// ===== SCHEDULE MAIL =====
async function scheduleMail() {
  const subject    = document.getElementById('subject').value.trim();
  const body       = document.getElementById('body-editor').value.trim();
  const scheduleDt = document.getElementById('schedule-dt').value;

  if (!subject)    { setStatus('件名を入力してください', 'err'); return; }
  if (!body)       { setStatus('本文を入力してください', 'err'); return; }
  if (!scheduleDt) { setStatus('配信予定日時を入力してください', 'err'); return; }

  const scheduleDate = new Date(scheduleDt);
  if (scheduleDate <= new Date()) { setStatus('配信日時は未来の日時を指定してください', 'err'); return; }

  const dateStr = scheduleDate.toLocaleString('ja-JP', {
    year: 'numeric', month: 'long', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });

  const confirmed = confirm(`件名：${subject}\n配信日時：${dateStr}\n\nこの日時に予約配信します。よろしいですか？`);
  if (!confirmed) return;

  const btn = document.getElementById('schedule-btn');
  btn.disabled = true;
  setStatus('予約中...', '');

  const htmlContent = buildHTML();

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'schedule',
        subject: subject,
        html: htmlContent,
        scheduledAt: scheduleDate.toISOString()
      })
    });

    const data = await res.json();
    if (data.ok) {
      setStatus(`✓ ${dateStr} に予約しました！Googleカレンダーにも登録されました。`, 'ok');
    } else {
      setStatus(`エラー: ${data.error || '予約に失敗しました'}`, 'err');
    }
  } catch(e) {
    setStatus('通信エラーが発生しました。', 'err');
  }
  btn.disabled = false;
}

// ===== INIT DATE =====
const now = new Date();
document.getElementById('date').value =
  `${now.getFullYear()}年${now.getMonth()+1}月`;
</script>
