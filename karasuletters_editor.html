<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>karasuletters — editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #111110;
  --black2: #1a1a18;
  --cream: #f0ede6;
  --gold: #c8b89a;
  --mid: #888880;
  --border: #2a2a28;
  --surface: #1e1e1c;
}

html, body {
  height: 100%;
  background: var(--black);
  color: var(--cream);
  font-family: 'EB Garamond', Georgia, serif;
}

/* grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.35;
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  max-width: 680px;
  margin: 0 auto;
  padding: 0 0 80px;
}

/* ===== HEADER ===== */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
}
.top-logo {
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--gold);
  text-transform: uppercase;
}
.top-mode {
  display: flex;
  gap: 4px;
}
.mode-btn {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--mid);
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn.active {
  background: var(--cream);
  color: var(--black);
  border-color: var(--cream);
}

/* ===== FIELDS ===== */
.fields {
  padding: 28px 28px 0;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.field-label {
  font-size: 10px;
  letter-spacing: 0.25em;
  color: var(--gold);
  text-transform: uppercase;
  display: block;
  margin-bottom: 8px;
}
input[type="text"], textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--cream);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 16px;
  padding: 12px 16px;
  outline: none;
  transition: border-color 0.2s;
  resize: none;
  -webkit-appearance: none;
}
input[type="text"]:focus, textarea:focus {
  border-color: var(--gold);
}
input[type="text"]::placeholder, textarea::placeholder {
  color: #444440;
}

/* ===== CLAUDE PANEL ===== */
.claude-panel {
  padding: 28px 28px 0;
}
.claude-prompt-wrap {
  display: flex;
  gap: 8px;
}
.claude-prompt-wrap textarea {
  flex: 1;
  height: 80px;
}
.claude-btn {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 0 18px;
  background: var(--surface);
  border: 1px solid var(--gold);
  color: var(--gold);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  align-self: stretch;
}
.claude-btn:hover { background: var(--gold); color: var(--black); }
.claude-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.claude-status {
  font-size: 11px;
  color: var(--mid);
  letter-spacing: 0.1em;
  margin-top: 10px;
  min-height: 18px;
  font-style: italic;
}

/* ===== DIVIDER ===== */
.divider {
  margin: 28px 28px 0;
  border: none;
  border-top: 1px solid var(--border);
}

/* ===== BODY EDITOR ===== */
.body-wrap {
  padding: 24px 28px 0;
}
#body-editor {
  width: 100%;
  min-height: 320px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--cream);
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 17px;
  line-height: 1.9;
  padding: 20px;
  outline: none;
  transition: border-color 0.2s;
  resize: vertical;
}
#body-editor:focus { border-color: var(--gold); }
#body-editor::placeholder { color: #444440; }

/* ===== PREVIEW ===== */
#preview-wrap {
  padding: 24px 28px 0;
  display: none;
}
.preview-frame {
  border: 1px solid var(--border);
  background: #f0ede6;
  width: 100%;
  min-height: 400px;
  overflow: hidden;
}
#preview-inner {
  width: 100%;
  padding: 0;
}

/* ===== SEND BAR ===== */
.send-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 10;
  background: var(--black2);
  border-top: 1px solid var(--border);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  gap: 12px;
  max-width: 680px;
  margin: 0 auto;
}
.send-btn {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 12px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 14px 28px;
  background: var(--cream);
  color: var(--black);
  border: none;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--gold); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-status {
  font-size: 13px;
  color: var(--mid);
  font-style: italic;
  flex: 1;
}
.send-status.ok { color: #7ab87a; }
.send-status.err { color: #c87a7a; }

/* ===== MOBILE ===== */
@media (max-width: 480px) {
  .top-bar { padding: 18px 20px; }
  .fields, .claude-panel, .body-wrap, .divider { padding-left: 20px; padding-right: 20px; }
  #preview-wrap { padding-left: 20px; padding-right: 20px; }
  .send-bar { padding: 14px 20px; }
  .top-logo { font-size: 10px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <span class="top-logo">karasuletters — editor</span>
    <div class="top-mode">
      <button class="mode-btn active" id="btn-edit" onclick="setMode('edit')">編集</button>
      <button class="mode-btn" id="btn-preview" onclick="setMode('preview')">プレビュー</button>
    </div>
  </div>

  <!-- META FIELDS -->
  <div class="fields">
    <div>
      <label class="field-label">号数 / Issue</label>
      <input type="text" id="issue" placeholder="No.001" value="No.001">
    </div>
    <div>
      <label class="field-label">件名 / Subject</label>
      <input type="text" id="subject" placeholder="【karasuletters】近況とお知らせ">
    </div>
    <div>
      <label class="field-label">日付 / Date</label>
      <input type="text" id="date" placeholder="2026年6月">
    </div>
    <div>
      <label class="field-label">署名 / Sign-off</label>
      <input type="text" id="signoff" placeholder="Shikine Watanabe" value="Shikine Watanabe">
    </div>
  </div>

  <hr class="divider">

  <!-- CLAUDE ASSIST -->
  <div class="claude-panel">
    <label class="field-label">Claude に原稿を書いてもらう</label>
    <div class="claude-prompt-wrap">
      <textarea id="claude-prompt" placeholder="例：今月は豊岡演劇祭に参加しました。舞台美術について書いてください。"></textarea>
      <button class="claude-btn" id="claude-gen-btn" onclick="generateWithClaude()">生成</button>
    </div>
    <p class="claude-status" id="claude-status"></p>
  </div>

  <hr class="divider">

  <!-- BODY EDITOR -->
  <div class="body-wrap" id="edit-wrap">
    <label class="field-label">本文</label>
    <textarea id="body-editor" placeholder="ここに本文を書いてください。&#10;&#10;Claudeで生成した文章をそのまま使うか、自分で書き換えて仕上げてください。"></textarea>
  </div>

  <!-- PREVIEW -->
  <div id="preview-wrap">
    <label class="field-label">プレビュー</label>
    <div class="preview-frame">
      <div id="preview-inner"></div>
    </div>
  </div>

</div>

<!-- SEND BAR -->
<div class="send-bar">
  <button class="send-btn" id="send-btn" onclick="sendToBrevo()">Brevo に送信</button>
  <span class="send-status" id="send-status">newsletter リストに一斉配信します</span>
</div>

<script>
// ===== CONFIG =====
const BREVO_API_KEY = 'YOUR_API_KEY_HERE';
const SENDER_NAME   = 'karasuletters';
const SENDER_EMAIL  = 'watanabeshikine@gmail.com';
const LIST_ID       = 5; // Brevo の newsletter リスト ID

// ===== MODE =====
function setMode(mode) {
  const editWrap    = document.getElementById('edit-wrap');
  const previewWrap = document.getElementById('preview-wrap');
  document.getElementById('btn-edit').classList.toggle('active', mode === 'edit');
  document.getElementById('btn-preview').classList.toggle('active', mode === 'preview');
  if (mode === 'preview') {
    editWrap.style.display    = 'none';
    previewWrap.style.display = 'block';
    document.getElementById('preview-inner').innerHTML = buildHTML();
  } else {
    editWrap.style.display    = 'block';
    previewWrap.style.display = 'none';
  }
}

// ===== BUILD HTML EMAIL =====
function buildHTML() {
  const issue   = document.getElementById('issue').value   || 'No.001';
  const date    = document.getElementById('date').value    || '';
  const signoff = document.getElementById('signoff').value || '';
  const body    = document.getElementById('body-editor').value || '';

  const bodyHTML = body.split(/\n\n+/).map(p =>
    p.trim() ? `<p style="font-size:16px;line-height:1.9;color:#2a2a2a;margin:0 0 24px;font-family:Georgia,serif;">${p.replace(/\n/g,'<br>')}</p>` : ''
  ).join('');

  return `
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f0ede6;padding:40px 0;">
<tr><td align="center">
<table width="560" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;background-color:#faf9f5;">
  <tr><td style="background-color:#1a1a1a;padding:40px 48px 32px;border-bottom:3px solid #c8b89a;">
    <p style="font-size:11px;letter-spacing:0.35em;color:#c8b89a;text-transform:uppercase;margin:0 0 12px;font-family:Georgia,serif;">letters from karasu</p>
    <h1 style="font-size:28px;color:#faf9f5;margin:0;font-weight:normal;font-family:Georgia,serif;letter-spacing:0.05em;">karasuletters</h1>
    <p style="font-size:11px;letter-spacing:0.2em;color:#888;text-transform:uppercase;margin:16px 0 0;font-family:Georgia,serif;">${issue}</p>
  </td></tr>
  <tr><td style="background-color:#e8e2d8;padding:10px 48px;border-bottom:1px solid #d4ccc0;">
    <p style="margin:0;font-size:11px;letter-spacing:0.15em;color:#888;font-family:Georgia,serif;text-transform:uppercase;">${date}</p>
  </td></tr>
  <tr><td style="padding:48px 48px 0;">
    ${bodyHTML}
  </td></tr>
  <tr><td style="padding:0 48px 48px;">
    <p style="font-size:14px;color:#555;font-family:Georgia,serif;font-style:italic;margin:0;">with love,</p>
    <p style="font-size:16px;color:#1a1a1a;font-family:Georgia,serif;margin:8px 0 0;letter-spacing:0.05em;">${signoff}</p>
  </td></tr>
  <tr><td style="background-color:#1a1a1a;padding:32px 48px;">
    <p style="font-size:10px;letter-spacing:0.3em;color:#c8b89a;text-transform:uppercase;font-family:Georgia,serif;margin:0 0 16px;">karasuletters</p>
    <p style="font-size:11px;color:#666;line-height:1.7;font-family:Georgia,serif;margin:0 0 8px;">このメールは購読を申し込まれた方にお送りしています。</p>
    <p style="font-size:10px;color:#555;font-family:Georgia,serif;margin:16px 0 0;">
      <a href="{{unsubscribe}}" style="color:#777;text-decoration:underline;">配信停止はこちら</a>
    </p>
  </td></tr>
</table>
</td></tr>
</table>`;
}

// ===== CLAUDE GENERATE =====
async function generateWithClaude() {
  const prompt = document.getElementById('claude-prompt').value.trim();
  if (!prompt) return;
  const btn    = document.getElementById('claude-gen-btn');
  const status = document.getElementById('claude-status');
  btn.disabled = true;
  status.textContent = '生成中...';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'あなたはメールマガジン「karasuletters」の編集アシスタントです。舞台美術家・建築家・美術作家として活動する渡辺志鬼根さんのメルマガの本文を書きます。文体は一人称・エッセイ調・ていねい語。改行は段落ごとに空行を入れてください。HTMLタグは使わないこと。',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    document.getElementById('body-editor').value = text;
    status.textContent = '✓ 生成しました。本文を確認・編集してください。';
  } catch(e) {
    status.textContent = 'エラーが発生しました。もう一度お試しください。';
  }
  btn.disabled = false;
}

// ===== SEND TO BREVO =====
async function sendToBrevo() {
  const subject = document.getElementById('subject').value.trim();
  const body    = document.getElementById('body-editor').value.trim();
  if (!subject) { setStatus('件名を入力してください', 'err'); return; }
  if (!body)    { setStatus('本文を入力してください', 'err'); return; }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  setStatus('送信中...', '');

  const htmlContent = buildHTML();

  try {
    const res = await fetch('https://api.brevo.com/v3/emailCampaigns', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'api-key': BREVO_API_KEY
      },
      body: JSON.stringify({
        name: `${document.getElementById('issue').value} — ${subject}`,
        subject: subject,
        sender: { name: SENDER_NAME, email: SENDER_EMAIL },
        type: 'classic',
        htmlContent: htmlContent,
        recipients: { listIds: [LIST_ID] },
        scheduledAt: null
      })
    });

    if (res.ok) {
      const data = await res.json();
      setStatus(`✓ Brevo にキャンペーンを作成しました（ID: ${data.id}）。Brevo で確認・送信してください。`, 'ok');
    } else {
      const err = await res.json();
      setStatus(`エラー: ${err.message || '送信に失敗しました'}`, 'err');
    }
  } catch(e) {
    setStatus('通信エラーが発生しました', 'err');
  }
  btn.disabled = false;
}

function setStatus(msg, cls) {
  const el = document.getElementById('send-status');
  el.textContent = msg;
  el.className = 'send-status ' + cls;
}

// ===== INIT DATE =====
const now = new Date();
document.getElementById('date').value =
  `${now.getFullYear()}年${now.getMonth()+1}月`;
</script>
</body>
</html>
